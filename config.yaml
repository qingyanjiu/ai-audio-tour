# ============================================================
# AI 大屏讲解员 - LLM & 服务配置
# ============================================================

llm:
  # 兼容 OpenAI API 格式的服务（LM Studio / Ollama / vLLM 等）
  provider: openai
  base_url: http://localhost:1234/v1
  api_key: lm-studio
  model: qwen/qwen3.5-9b
  temperature: 0.1
  max_tokens: 1024
  timeout: 60

server:
  host: 0.0.0.0
  port: 8000

image:
  # 图片压缩参数（上传时自动压缩，减小 token 消耗）
  max_size: 1024       # 长边最大像素
  quality: 85          # JPEG 压缩质量

# 大屏截图配置（capture.py 使用）
screenshot:
  # Chrome DevTools Protocol 连接地址
  cdp_host: 127.0.0.1
  cdp_port: 9222

  # 大屏页面地址，多个页面可配置
  urls:
  - name: 智慧安防
    url: http://localhost:555/1.html
  # 截图保存目录
  output_dir: ./screenshots

# ============================================================
# TTS 语音合成配置（Kokoro-TTS）
# ============================================================

tts:
  enabled: true
  provider: kokoro
  # 讲解音色：female（女声）/ male（男声），或直接填写音色名如 zf_xiaobei
  voice: female
  speed: 1.0
  sample_rate: 24000
  # 句间静音间隔（秒），使合成语音听起来更自然
  silence_sec: 0.3
  # 运行设备：auto（自动）/ cuda（N 卡）/ cpu
  device: auto
